<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Ceal이 AX 공유회 노션 문서에서 다음주까지 시도할 일을 추출하여 넛지하는 기록">
  <defs>
    <style>
      text { font-family: Pretendard, Arial, sans-serif; fill: #d6d9df; }
      .muted { fill: #9aa1aa; font-size: 20px; font-weight: 650; }
      .title { fill: #f2f4f8; font-size: 27px; font-weight: 850; }
      .body { fill: #d0d5dd; font-size: 23px; font-weight: 520; }
      .link { fill: #3fb8d9; font-size: 23px; font-weight: 650; }
      .mention { fill: #8dd5ff; font-size: 22px; font-weight: 720; }
      .pill { fill: #3b424d; }
      .highlight { fill: #5a4d0e; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="#1c1f26"/>
  <circle cx="54" cy="54" r="30" fill="#e8f4ff"/>
  <path d="M38 56c12-22 32-23 39-5c5 15-7 28-25 29c-14 0-22-8-14-24z" fill="#0b93bd"/>
  <text class="title" x="98" y="46">Ceal</text>
  <text class="muted" x="168" y="46">앱 · 오전 10:32</text>
  <text class="title" x="98" y="84">2026-06-18 AX 공유회 - 다음주까지 할 일</text>
  <text class="body" x="98" y="126">원문:</text>
  <text class="link" x="160" y="126">2026-06-18 AX 공유회 Notion 문서</text>
  <g transform="translate(98,168)">
    <text class="mention" x="0" y="0">@</text><rect class="pill" x="28" y="-25" width="82" height="34" rx="7"/>
    <text class="body" x="0" y="44">• 크라켄에서 위계를 더 줄일 방법 생각해보기. 채널 제거?</text>
    <text class="mention" x="0" y="94">@</text><rect class="pill" x="28" y="69" width="82" height="34" rx="7"/>
    <text class="body" x="0" y="138">• 아침 회고 또는 AI 일지 손으로 글쓰고 사진찍어서 올리기</text>
    <text class="body" x="0" y="182">• 내 에이전트 이메일 할당해주고 내가 포워딩해주기</text>
    <text class="body" x="0" y="226">• 인맥 교류 관리 페이지 만들어봐야겠다.</text>
    <text class="body" x="0" y="270">• 라이트하우스에 discovery track 적용해봐야지</text>
    <text class="mention" x="0" y="320">@</text><rect class="pill" x="28" y="295" width="82" height="34" rx="7"/>
    <text class="body" x="0" y="364">• 크라켄 사용 재시도 해보기</text>
    <text class="mention" x="0" y="414">@</text><rect class="pill" x="28" y="389" width="82" height="34" rx="7"/>
    <text class="body" x="0" y="458">• KCCV 2026 준비할 때 크라켄을 썼었는데, agent를 만들어서 개발먹기 해봐야겠다.</text>
    <text class="mention" x="0" y="508">@</text><rect class="pill" x="28" y="483" width="82" height="34" rx="7"/>
    <text class="body" x="0" y="552">• 리트 - 문카한테 내가 자주 쓰던 문라이트 관련 스킬 줘보기</text>
    <text class="mention" x="0" y="602">@</text><rect class="pill" x="28" y="577" width="82" height="34" rx="7"/>
    <text class="body" x="0" y="646">• 나의 Human in the loop 정리하기</text>
    <text class="mention" x="0" y="696">@</text><rect class="pill" x="28" y="671" width="82" height="34" rx="7"/>
    <text class="body" x="0" y="740">• 크라켄에 에이전트 추가해서 codex랑 협업하도록 해서 업무적으로 이용해보기</text>
    <rect class="highlight" x="734" y="773" width="58" height="32" rx="4"/>
    <text class="body" x="0" y="798">• (어차피 할 일) Craken에 내 Codex 넣고, Codex + Craken + </text>
    <text class="body" x="742" y="798">Ceal</text>
    <text class="body" x="808" y="798"> 그림이 매력적이게 될 만한 시나리오 구성</text>
  </g>
</svg>
